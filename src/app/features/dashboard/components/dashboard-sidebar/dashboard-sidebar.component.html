<aside class="space-y-3">
  <!-- Business card -->
  <div
    class="relative overflow-hidden bg-slate-900/80 backdrop-blur-md border border-slate-800/70 rounded-2xl shadow-xl">
    <!-- Top accent -->
    <div class="h-[2px] bg-gradient-to-r from-violet-500 via-fuchsia-500 to-transparent rounded-t-2xl"></div>

    <div class="p-5 flex flex-col items-center text-center space-y-3">
      <!-- Logo -->
      <div class="relative mt-1">
        <div
          class="w-[72px] h-[72px] rounded-2xl overflow-hidden bg-slate-800 border-2 border-slate-700/60 flex items-center justify-center shadow-lg">
          @if (profile().logo_url) {
          <img [src]="profile().logo_url" alt="Logo" class="w-full h-full object-cover" />
          } @else {
          <div
            class="w-full h-full flex items-center justify-center bg-gradient-to-br from-slate-800 to-slate-900">
            <i class="pi pi-image text-xl text-slate-600"></i>
          </div>
          }
        </div>
        <!-- Active indicator -->
        <div
          class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-400 rounded-full border-2 border-slate-900 shadow-sm">
        </div>
      </div>

      <div class="space-y-1.5">
        <h3 class="font-bold text-slate-100 text-base leading-tight">{{ profile().business_name }}</h3>
        <span
          class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-violet-900/50 text-violet-300 border border-violet-700/40 uppercase tracking-wider">
          {{ profile().category }}
        </span>
      </div>

      <!-- Stats row -->
      <div class="w-full grid grid-cols-2 gap-2 pt-2 border-t border-slate-800/60">
        <div class="bg-slate-950/50 rounded-xl p-2 text-center">
          <p class="text-[10px] text-slate-500 font-medium uppercase tracking-wide">Plan</p>
          <p class="text-xs font-bold text-slate-300 mt-0.5 capitalize">{{ profile().subscription_plan }}</p>
        </div>
        <div class="bg-slate-950/50 rounded-xl p-2 text-center">
          <p class="text-[10px] text-slate-500 font-medium uppercase tracking-wide">Status</p>
          <p class="text-xs font-bold text-emerald-400 mt-0.5">Active</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="bg-slate-900/80 backdrop-blur-md border border-slate-800/70 p-2 rounded-2xl shadow-xl space-y-0.5">
    @for (item of navItems(); track item.tab) {
    <button (click)="tabSelected.emit(item.tab)" [class]="
              'w-full flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-medium transition-all duration-150 cursor-pointer ' +
              (activeTab() === item.tab
                ? 'bg-violet-600/20 text-violet-300 shadow-sm'
                : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/60')
            ">
      <i
        [class]="item.icon + ' text-sm flex-shrink-0 ' + (activeTab() === item.tab ? 'text-violet-400' : 'text-slate-500')"></i>
      <span>{{ item.label }}</span>
      @if (activeTab() === item.tab) {
      <span class="ml-auto w-1.5 h-1.5 rounded-full bg-violet-400 flex-shrink-0"></span>
      }
    </button>
    }
  </nav>
</aside>
